<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <defs>
    <!-- Radial gradient: hot ember center fading to deep orange edge -->
    <radialGradient id="bgGlow" cx="42%" cy="38%" r="62%">
      <stop offset="0%"   stop-color="#ffb347"/>
      <stop offset="60%"  stop-color="#f57c00"/>
      <stop offset="100%" stop-color="#c44d00"/>
    </radialGradient>
    <!-- Subtle inner ring to add depth -->
    <radialGradient id="ringGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Orange power background -->
  <rect x="3" y="3" width="90" height="90" rx="14" fill="url(#bgGlow)"/>
  <!-- Soft inner highlight for depth -->
  <rect x="3" y="3" width="90" height="90" rx="14" fill="url(#ringGlow)"/>

  <!-- 4 arc segments going clockwise — each represents one sync phase -->

  <!-- Arc 1: top-right -->
  <path d="M 52.86 20.43 A 28 28 0 0 1 75.57 43.14"
        fill="none" stroke="white" stroke-width="6.5" stroke-linecap="round" opacity="0.95"/>
  <polygon points="75.57,43.14 69.43,37.12 79.27,35.38" fill="white"/>

  <!-- Arc 2: bottom-right -->
  <path d="M 75.57 52.86 A 28 28 0 0 1 52.86 75.57"
        fill="none" stroke="white" stroke-width="6.5" stroke-linecap="round" opacity="0.95"/>
  <polygon points="52.86,75.57 58.88,69.43 60.62,79.27" fill="white"/>

  <!-- Arc 3: bottom-left -->
  <path d="M 43.14 75.57 A 28 28 0 0 1 20.43 52.86"
        fill="none" stroke="white" stroke-width="6.5" stroke-linecap="round" opacity="0.95"/>
  <polygon points="20.43,52.86 26.57,58.88 16.73,60.62" fill="white"/>

  <!-- Arc 4: top-left -->
  <path d="M 20.43 43.14 A 28 28 0 0 1 43.14 20.43"
        fill="none" stroke="white" stroke-width="6.5" stroke-linecap="round" opacity="0.95"/>
  <polygon points="43.14,20.43 37.12,26.57 35.38,16.73" fill="white"/>

  <!-- White sparkles — power indicator, top-right area -->
  <path d="M 80 9 Q 80 16 87 16 Q 80 16 80 23 Q 80 16 73 16 Q 80 16 80 9 Z" fill="white" opacity="0.92"/>
  <path d="M 86 20 Q 86 23 89 23 Q 86 23 86 26 Q 86 23 83 23 Q 86 23 86 20 Z" fill="white" opacity="0.7"/>
</svg>
