<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <defs>
    <linearGradient id="magicGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4a90e2"/>
      <stop offset="100%" stop-color="#9013fe"/>
    </linearGradient>
  </defs>

  <!-- Stacked documents (3 layers) — multi-doc concept -->
  <!-- Back doc (lightest) -->
  <path d="M 18 28 L 18 72 L 52 72 L 52 34 L 46 28 Z" fill="none" stroke="#888888" stroke-width="3" stroke-linejoin="round" opacity="0.4"/>
  <!-- Middle doc -->
  <path d="M 22 22 L 22 66 L 56 66 L 56 28 L 50 22 Z" fill="none" stroke="#888888" stroke-width="3.5" stroke-linejoin="round" opacity="0.65"/>
  <path d="M 50 22 L 50 28 L 56 28" fill="none" stroke="#888888" stroke-width="3.5" stroke-linejoin="round" opacity="0.65"/>
  <!-- Front doc (strongest) -->
  <path d="M 26 16 L 26 60 L 60 60 L 60 22 L 54 16 Z" fill="none" stroke="#888888" stroke-width="4" stroke-linejoin="round"/>
  <path d="M 54 16 L 54 22 L 60 22" fill="none" stroke="#888888" stroke-width="4" stroke-linejoin="round"/>
  <!-- Content lines on front doc -->
  <line x1="33" y1="30" x2="53" y2="30" stroke="#888888" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="33" y1="37" x2="50" y2="37" stroke="#888888" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="33" y1="44" x2="53" y2="44" stroke="#888888" stroke-width="2" stroke-linecap="round" opacity="0.5"/>

  <!-- Sync circular arrow (gradient) — bottom-right area, overlapping docs -->
  <path d="M 76 52 A 18 18 0 1 1 62 40"
        fill="none" stroke="url(#magicGradient)" stroke-width="5" stroke-linecap="round"/>
  <!-- Arrowhead -->
  <polygon points="62,40 68,38 66,45" fill="url(#magicGradient)"/>

  <!-- Second small sync arrow (inner, for "cycle" feel) -->
  <path d="M 60 64 A 12 12 0 1 0 72 56"
        fill="none" stroke="url(#magicGradient)" stroke-width="3.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Sparkle stars (orange) — PRO indicator -->
  <path d="M 82 10 Q 82 18 90 18 Q 82 18 82 26 Q 82 18 74 18 Q 82 18 82 10 Z" fill="#f5a623"/>
  <path d="M 72 6 Q 72 9 75 9 Q 72 9 72 12 Q 72 9 69 9 Q 72 9 72 6 Z" fill="#f5a623" opacity="0.7"/>
</svg>
