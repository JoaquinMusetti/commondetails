<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <linearGradient id="magicGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4a90e2"/>
      <stop offset="100%" stop-color="#9013fe"/>
    </linearGradient>
  </defs>

  <!-- Sheet / document (gray) with folded corner -->
  <path d="M 8 8 L 46 8 L 56 18 L 56 72 L 8 72 Z" fill="none" stroke="#888888" stroke-width="4" stroke-linejoin="round"/>
  <path d="M 46 8 L 46 18 L 56 18" fill="none" stroke="#888888" stroke-width="4" stroke-linejoin="round"/>
  <!-- Sheet lines (gray, faint) -->
  <line x1="16" y1="30" x2="48" y2="30" stroke="#888888" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="16" y1="39" x2="44" y2="39" stroke="#888888" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="16" y1="48" x2="40" y2="48" stroke="#888888" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Gradient magnifier circle -->
  <circle cx="60" cy="60" r="22" fill="none" stroke="url(#magicGradient)" stroke-width="5"/>
  <!-- Magnifier handle (dark) -->
  <line x1="76" y1="76" x2="90" y2="90" stroke="#2c3e50" stroke-width="6" stroke-linecap="round"/>

  <!-- Exclamation inside magnifier (orange) -->
  <line x1="60" y1="48" x2="60" y2="62" stroke="#f5a623" stroke-width="4" stroke-linecap="round"/>
  <circle cx="60" cy="70" r="3" fill="#f5a623"/>

  <!-- Mini sparkle top-right -->
  <path d="M 84 6 Q 84 10 88 10 Q 84 10 84 14 Q 84 10 80 10 Q 84 10 84 6 Z" fill="#f5a623"/>
</svg>