<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <defs>
    <linearGradient id="magicGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4a90e2"/>
      <stop offset="100%" stop-color="#9013fe"/>
    </linearGradient>
  </defs>

  <!-- 3 cascaded view frames, back to front -->
  <rect x="30" y="10" width="52" height="38" rx="3"
        fill="none" stroke="#888888" stroke-width="3.5" opacity="0.30"/>
  <rect x="22" y="18" width="52" height="38" rx="3"
        fill="none" stroke="#888888" stroke-width="3.5" opacity="0.65"/>
  <!-- Front frame — gradient stroke marks this as the detected hot view -->
  <rect x="14" y="26" width="52" height="38" rx="3"
        fill="none" stroke="url(#magicGradient)" stroke-width="4.5"/>

  <!-- Mini heatmap inside front frame (2×3, 9×9 cells, gap 2) -->
  <!-- Row 1 -->
  <rect x="22" y="34" width="9" height="9" rx="1" fill="url(#magicGradient)" fill-opacity="0.85"/>
  <rect x="33" y="34" width="9" height="9" rx="1" fill="url(#magicGradient)" fill-opacity="0.45"/>
  <rect x="44" y="34" width="9" height="9" rx="1" fill="url(#magicGradient)" fill-opacity="0.15"/>
  <!-- Row 2 -->
  <rect x="22" y="45" width="9" height="9" rx="1" fill="url(#magicGradient)" fill-opacity="0.40"/>
  <rect x="33" y="45" width="9" height="9" rx="1" fill="url(#magicGradient)" fill-opacity="0.12"/>
  <rect x="44" y="45" width="9" height="9" rx="1"
        fill="none" stroke="#888888" stroke-width="1.5" opacity="0.35"/>

  <!-- Orange sparkle — top-right corner, outside grid -->
  <path d="M 84 8 Q 84 12 88 12 Q 84 12 84 16 Q 84 12 80 12 Q 84 12 84 8 Z" fill="#f5a623"/>
</svg>
