<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <linearGradient id="magicGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4a90e2"/>
      <stop offset="100%" stop-color="#9013fe"/>
    </linearGradient>
  </defs>

  <!-- Background view rect (gray, faded) -->
  <rect x="6" y="16" width="52" height="38" rx="3" fill="none" stroke="#888888" stroke-width="4" opacity="0.45"/>
  <!-- Foreground view rect (gray) -->
  <rect x="14" y="26" width="52" height="38" rx="3" fill="none" stroke="#888888" stroke-width="4"/>

  <!-- Gradient magnifier circle -->
  <circle cx="52" cy="52" r="22" fill="none" stroke="url(#magicGradient)" stroke-width="5"/>
  <!-- Magnifier handle (dark) -->
  <line x1="68" y1="68" x2="84" y2="84" stroke="#2c3e50" stroke-width="6" stroke-linecap="round"/>

  <!-- Exclamation inside magnifier (orange) -->
  <line x1="52" y1="40" x2="52" y2="54" stroke="#f5a623" stroke-width="4" stroke-linecap="round"/>
  <circle cx="52" cy="62" r="3" fill="#f5a623"/>

  <!-- Mini sparkle top-right -->
  <path d="M 84 6 Q 84 10 88 10 Q 84 10 84 14 Q 84 10 80 10 Q 84 10 84 6 Z" fill="#f5a623"/>
</svg>