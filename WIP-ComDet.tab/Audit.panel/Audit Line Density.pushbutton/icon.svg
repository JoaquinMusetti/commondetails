<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <defs>
    <linearGradient id="magicGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4a90e2"/>
      <stop offset="100%" stop-color="#9013fe"/>
    </linearGradient>
  </defs>

  <!-- 4x4 heatmap grid: cell 16x16, gap 2, origin (14,14), extent (84,84) -->
  <!-- Hotspot at (col2,row2) decays outward -->

  <!-- Row 1 -->
  <rect x="14" y="14" width="16" height="16" rx="2" fill="none" stroke="#888888" stroke-width="2.5"/>
  <rect x="32" y="14" width="16" height="16" rx="2" fill="url(#magicGradient)" fill-opacity="0.15" stroke="#888888" stroke-width="2.5"/>
  <rect x="50" y="14" width="16" height="16" rx="2" fill="url(#magicGradient)" fill-opacity="0.10" stroke="#888888" stroke-width="2.5"/>
  <rect x="68" y="14" width="16" height="16" rx="2" fill="none" stroke="#888888" stroke-width="2.5"/>

  <!-- Row 2 -->
  <rect x="14" y="32" width="16" height="16" rx="2" fill="url(#magicGradient)" fill-opacity="0.10" stroke="#888888" stroke-width="2.5"/>
  <rect x="32" y="32" width="16" height="16" rx="2" fill="url(#magicGradient)" fill-opacity="0.90" stroke="url(#magicGradient)" stroke-width="3.5"/>
  <rect x="50" y="32" width="16" height="16" rx="2" fill="url(#magicGradient)" fill-opacity="0.50" stroke="#888888" stroke-width="2.5"/>
  <rect x="68" y="32" width="16" height="16" rx="2" fill="url(#magicGradient)" fill-opacity="0.08" stroke="#888888" stroke-width="2.5"/>

  <!-- Row 3 -->
  <rect x="14" y="50" width="16" height="16" rx="2" fill="url(#magicGradient)" fill-opacity="0.08" stroke="#888888" stroke-width="2.5"/>
  <rect x="32" y="50" width="16" height="16" rx="2" fill="url(#magicGradient)" fill-opacity="0.45" stroke="#888888" stroke-width="2.5"/>
  <rect x="50" y="50" width="16" height="16" rx="2" fill="url(#magicGradient)" fill-opacity="0.20" stroke="#888888" stroke-width="2.5"/>
  <rect x="68" y="50" width="16" height="16" rx="2" fill="none" stroke="#888888" stroke-width="2.5"/>

  <!-- Row 4 -->
  <rect x="14" y="68" width="16" height="16" rx="2" fill="none" stroke="#888888" stroke-width="2.5"/>
  <rect x="32" y="68" width="16" height="16" rx="2" fill="url(#magicGradient)" fill-opacity="0.10" stroke="#888888" stroke-width="2.5"/>
  <rect x="50" y="68" width="16" height="16" rx="2" fill="none" stroke="#888888" stroke-width="2.5"/>
  <rect x="68" y="68" width="16" height="16" rx="2" fill="none" stroke="#888888" stroke-width="2.5"/>

  <!-- Orange spark accent (small) — top-right canvas corner, outside grid -->
  <path d="M 90 4 Q 90 8 94 8 Q 90 8 90 12 Q 90 8 86 8 Q 90 8 90 4 Z" fill="#f5a623"/>
</svg>
