<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <linearGradient id="magicGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4a90e2"/>
      <stop offset="100%" stop-color="#9013fe"/>
    </linearGradient>
  </defs>

  <!-- Sheet outline (gradient — primary subject) -->
  <rect x="14" y="10" width="68" height="76" rx="3" fill="none" stroke="url(#magicGradient)" stroke-width="5"/>

  <!-- Title block divider (horizontal) -->
  <line x1="14" y1="66" x2="82" y2="66" stroke="url(#magicGradient)" stroke-width="4"/>

  <!-- Title block vertical divider -->
  <line x1="58" y1="66" x2="58" y2="86" stroke="url(#magicGradient)" stroke-width="3"/>

  <!-- Title block content (small gray lines inside title block) -->
  <line x1="62" y1="73" x2="78" y2="73" stroke="#888888" stroke-width="2" stroke-linecap="round"/>
  <line x1="62" y1="80" x2="74" y2="80" stroke="#888888" stroke-width="2" stroke-linecap="round"/>

  <!-- Sheet body content lines (dark structure) -->
  <line x1="24" y1="22" x2="68" y2="22" stroke="#2c3e50" stroke-width="3" stroke-linecap="round"/>
  <line x1="24" y1="34" x2="72" y2="34" stroke="#2c3e50" stroke-width="3" stroke-linecap="round"/>
  <line x1="24" y1="46" x2="60" y2="46" stroke="#2c3e50" stroke-width="3" stroke-linecap="round"/>
  <line x1="24" y1="58" x2="64" y2="58" stroke="#2c3e50" stroke-width="3" stroke-linecap="round"/>

  <!-- Large sparkle top-right -->
  <path d="M 84 6 Q 84 14 92 14 Q 84 14 84 22 Q 84 14 76 14 Q 84 14 84 6 Z" fill="#f5a623"/>

  <!-- Small sparkle bottom-left -->
