  <!-- Corner brackets on foreground (crop region) -->
  <g fill="none" stroke="#2c3e50" stroke-width="3.5" stroke-linecap="square" stroke-linejoin="miter">
    <path d="M 40 50 L 40 46 L 44 46"/>
    <path d="M 80 46 L 84 46 L 84 50"/>
    <path d="M 44 76 L 40 76 L 40 72"/>
    <path d="M 84 72 L 84 76 L 80 76"/>
  </g>

  <!-- Large sparkle top-right -->
  <path d="M 80 8 Q 80 18 90 18 Q 80 18 80 28 Q 80 18 70 18 Q 80 18 80 8 Z" fill="#f5a623"/>

  <!-- Small sparkle bottom-left -->
  <path d="M 14 78 Q 14 82 18 82 Q 14 82 14 86 Q 14 82 10 82 Q 14 82 14 78 Z" fill="#f5a623"/>
</svg>
