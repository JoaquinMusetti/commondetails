<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <linearGradient id="magicGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4a90e2"/>
      <stop offset="100%" stop-color="#9013fe"/>
    </linearGradient>
  </defs>

  <!-- Background dependent view (dashed gray) -->
  <rect x="10" y="14" width="48" height="36" rx="3" fill="none" stroke="#888888" stroke-width="4" stroke-dasharray="6 4"/>

  <!-- Foreground dependent view (gradient) -->
