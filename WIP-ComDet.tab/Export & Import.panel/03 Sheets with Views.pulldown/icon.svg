<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <linearGradient id="magicGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4a90e2"/>
      <stop offset="100%" stop-color="#9013fe"/>
    </linearGradient>
  </defs>

  <!-- Sheet outline (gradient — primary subject) -->
  <rect x="8" y="10" width="80" height="76" rx="3" fill="none" stroke="url(#magicGradient)" stroke-width="5"/>

  <!-- Title block divider -->
  <line x1="8" y1="68" x2="88" y2="68" stroke="url(#magicGradient)" stroke-width="4"/>

  <!-- Title block content -->
  <line x1="14" y1="75" x2="40" y2="75" stroke="#888888" stroke-width="2" stroke-linecap="round"/>
  <line x1="14" y1="81" x2="34" y2="81" stroke="#888888" stroke-width="2" stroke-linecap="round"/>

  <!-- Title block sheet number box -->
  <rect x="60" y="72" width="22" height="12" rx="1" fill="none" stroke="#2c3e50" stroke-width="2.5"/>

  <!-- Viewport rect inside sheet (gray dashed) -->
  <rect x="18" y="20" width="60" height="38" rx="2" fill="none" stroke="#888888" stroke-width="3.5" stroke-dasharray="5 4"/>

  <!-- Corner brackets on viewport (crop region — dark) -->
  <g fill="none" stroke="#2c3e50" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter">
    <path d="M 24 28 L 24 24 L 28 24"/>
    <path d="M 68 24 L 72 24 L 72 28"/>
    <path d="M 28 54 L 24 54 L 24 50"/>
    <path d="M 72 50 L 72 54 L 68 54"/>
  </g>

  <!-- Large sparkle top-right -->
  <path d="M 90 4 Q 90 12 84 12 Q 90 12 90 20 Q 90 12 96 12 Q 90 12 90 4 Z" fill="#f5a623"/>

  <!-- Small sparkle bottom-left -->
  <path d="M 6 80 Q 6 84 10 84 Q 6 84 6 88 Q 6 84 2 84 Q 6 84 6 80 Z" fill="#f5a623"/>
</svg>
