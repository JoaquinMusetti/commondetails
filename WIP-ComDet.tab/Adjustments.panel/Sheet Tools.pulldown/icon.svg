<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <linearGradient id="sheetGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4a90e2"/>
      <stop offset="100%" stop-color="#9013fe"/>
    </linearGradient>
  </defs>

  <!-- Sheet body -->
  <path d="M 16 10 L 64 10 L 80 26 L 80 86 L 16 86 Z"
        fill="#f0f4ff" stroke="#2c3e50" stroke-width="4" stroke-linejoin="round"/>

  <!-- Folded corner -->
  <path d="M 64 10 L 64 26 L 80 26"
        fill="none" stroke="#2c3e50" stroke-width="4" stroke-linejoin="round"/>
  <path d="M 64 10 L 80 26 L 64 26 Z"
        fill="#c8d4ef" stroke="none"/>

  <!-- Horizontal lines (sheet content) -->
  <line x1="26" y1="40" x2="58" y2="40" stroke="url(#sheetGrad)" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="26" y1="52" x2="62" y2="52" stroke="#888888" stroke-width="3" stroke-linecap="round"/>
  <line x1="26" y1="63" x2="50" y2="63" stroke="#888888" stroke-width="3" stroke-linecap="round"/>

  <!-- Gear — bottom-right -->
  <!-- Gear body (circle) -->
  <circle cx="70" cy="74" r="9" fill="none" stroke="url(#sheetGrad)" stroke-width="5"/>
  <circle cx="70" cy="74" r="3.5" fill="#4a90e2"/>

  <!-- Gear teeth (8 teeth, short lines radiating outward) -->
  <line x1="70" y1="60" x2="70" y2="63" stroke="url(#sheetGrad)" stroke-width="4" stroke-linecap="round"/>
  <line x1="70" y1="85" x2="70" y2="88" stroke="url(#sheetGrad)" stroke-width="4" stroke-linecap="round"/>
  <line x1="56" y1="74" x2="59" y2="74" stroke="url(#sheetGrad)" stroke-width="4" stroke-linecap="round"/>
  <line x1="81" y1="74" x2="84" y2="74" stroke="url(#sheetGrad)" stroke-width="4" stroke-linecap="round"/>
  <line x1="60.1" y1="64.1" x2="62.2" y2="66.2" stroke="url(#sheetGrad)" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="77.8" y1="81.8" x2="79.9" y2="83.9" stroke="url(#sheetGrad)" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="60.1" y1="83.9" x2="62.2" y2="81.8" stroke="url(#sheetGrad)" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="77.8" y1="66.2" x2="79.9" y2="64.1" stroke="url(#sheetGrad)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Sparkle – top-right -->
  <path d="M 88 6 Q 88 12 94 12 Q 88 12 88 18 Q 88 12 82 12 Q 88 12 88 6 Z" fill="#f5a623"/>
</svg>
