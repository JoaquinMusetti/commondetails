<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <defs>
    <linearGradient id="magicGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4a90e2"/>
      <stop offset="100%" stop-color="#9013fe"/>
    </linearGradient>
  </defs>

  <!-- SOURCE document (left) — gray dashed = "from here" -->
  <rect x="8" y="22" width="28" height="44" rx="3"
        fill="none" stroke="#888888" stroke-width="4" stroke-dasharray="5 3"/>
  <line x1="14" y1="33" x2="30" y2="33" stroke="#888888" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="14" y1="41" x2="30" y2="41" stroke="#888888" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="14" y1="49" x2="24" y2="49" stroke="#888888" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="14" y1="57" x2="28" y2="57" stroke="#888888" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>

  <!-- ARROW — gradient, center of canvas -->
  <line x1="40" y1="44" x2="52" y2="44"
        stroke="url(#magicGradient)" stroke-width="5" stroke-linecap="round"/>
  <path d="M 48 38 L 55 44 L 48 50"
        fill="none" stroke="url(#magicGradient)" stroke-width="5"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- TARGET document (right) — gradient outline = "to here" -->
  <rect x="58" y="22" width="28" height="44" rx="3"
        fill="none" stroke="url(#magicGradient)" stroke-width="4"/>
  <!-- Empty placeholder inside — waiting to receive sheets -->
  <rect x="63" y="30" width="18" height="28" rx="1"
        fill="none" stroke="#888888" stroke-width="2" stroke-dasharray="4 3" opacity="0.5"/>

  <!-- Sparkle accent — top-right corner -->
  <path d="M 80 6 Q 80 13 87 13 Q 80 13 80 20 Q 80 13 73 13 Q 80 13 80 6 Z" fill="#f5a623"/>
  <path d="M 88 18 Q 88 21 91 21 Q 88 21 88 24 Q 88 21 85 21 Q 88 21 88 18 Z" fill="#f5a623"/>
</svg>
