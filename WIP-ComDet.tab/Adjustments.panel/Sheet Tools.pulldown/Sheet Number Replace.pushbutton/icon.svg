<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <defs>
    <linearGradient id="magicGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4a90e2"/>
      <stop offset="100%" stop-color="#9013fe"/>
    </linearGradient>
  </defs>

  <!-- Sheet document (gray outline) -->
  <path d="M 12 8 L 52 8 L 63 19 L 63 88 L 12 88 Z"
        fill="none" stroke="#888888" stroke-width="4.5" stroke-linejoin="round"/>
  <!-- Folded corner -->
  <path d="M 52 8 L 52 19 L 63 19"
        fill="none" stroke="#888888" stroke-width="4.5" stroke-linejoin="round"/>

  <!-- Old number: bold prefix segment + dot separator + lighter number segment -->
  <line x1="20" y1="34" x2="32" y2="34" stroke="#888888" stroke-width="5.5" stroke-linecap="round"/>
  <circle cx="35.5" cy="34" r="2" fill="#888888" opacity="0.7"/>
  <line x1="39" y1="34" x2="55" y2="34" stroke="#888888" stroke-width="3" stroke-linecap="round" opacity="0.7"/>

  <!-- Replace arrow (dark, pointing down) -->
  <line x1="37" y1="43" x2="37" y2="52" stroke="#2c3e50" stroke-width="4" stroke-linecap="round"/>
  <path d="M 29 49 L 37 57 L 45 49"
        fill="none" stroke="#2c3e50" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- New number: gradient prefix segment + dot separator + same lighter number segment -->
  <line x1="20" y1="66" x2="32" y2="66" stroke="url(#magicGradient)" stroke-width="5.5" stroke-linecap="round"/>
  <circle cx="35.5" cy="66" r="2" fill="#888888" opacity="0.4"/>
  <line x1="39" y1="66" x2="55" y2="66" stroke="#888888" stroke-width="3" stroke-linecap="round" opacity="0.4"/>

  <!-- Sparkle top-right -->
  <path d="M 78 6 Q 78 17 89 17 Q 78 17 78 28 Q 78 17 67 17 Q 78 17 78 6 Z" fill="#f5a623"/>
</svg>
