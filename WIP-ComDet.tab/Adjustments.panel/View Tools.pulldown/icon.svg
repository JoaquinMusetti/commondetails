<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <linearGradient id="magicGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4a90e2"/>
      <stop offset="100%" stop-color="#9013fe"/>
    </linearGradient>
  </defs>

  <!-- Outer dashed viewport frame (gray) -->
  <rect x="8" y="14" width="66" height="52" rx="3" fill="none" stroke="#888888" stroke-width="4" stroke-dasharray="7 5"/>

  <!-- Inner crop box (gradient) -->
  <rect x="20" y="24" width="42" height="32" rx="2" fill="none" stroke="url(#magicGradient)" stroke-width="5"/>

  <!-- Corner bracket – top-left -->
  <path d="M 20 36 L 20 24 L 32 24" fill="none" stroke="#2c3e50" stroke-width="3.5" stroke-linecap="square" stroke-linejoin="miter"/>
  <!-- Corner bracket – bottom-right -->
  <path d="M 50 56 L 62 56 L 62 44" fill="none" stroke="#2c3e50" stroke-width="3.5" stroke-linecap="square" stroke-linejoin="miter"/>

  <!-- Offset arrows pointing outward (dark) – top & right -->
  <line x1="41" y1="24" x2="41" y2="11" stroke="#2c3e50" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M 36 16 L 41 11 L 46 16" fill="none" stroke="#2c3e50" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <line x1="62" y1="40" x2="80" y2="40" stroke="#2c3e50" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M 75 35 L 80 40 L 75 45" fill="none" stroke="#2c3e50" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Sparkle – top-right -->
  <path d="M 82 8 Q 82 16 90 16 Q 82 16 82 24 Q 82 16 74 16 Q 82 16 82 8 Z" fill="#f5a623"/>
  <!-- Mini sparkle – bottom-left -->
  <path d="M 14 76 Q 14 80 18 80 Q 14 80 14 84 Q 14 80 10 80 Q 14 80 14 76 Z" fill="#f5a623"/>
</svg>