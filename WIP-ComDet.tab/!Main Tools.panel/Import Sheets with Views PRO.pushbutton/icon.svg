<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <linearGradient id="magicGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4a90e2"/>
      <stop offset="100%" stop-color="#9013fe"/>
    </linearGradient>
  </defs>

  <!-- Sheet (destination) on the right — gradient -->
  <rect x="34" y="10" width="54" height="74" rx="3" fill="none" stroke="url(#magicGradient)" stroke-width="5"/>

  <!-- Title block divider -->
  <line x1="34" y1="66" x2="88" y2="66" stroke="url(#magicGradient)" stroke-width="3.5"/>

  <!-- Title block sheet number box -->
  <rect x="70" y="70" width="14" height="10" rx="1" fill="none" stroke="#2c3e50" stroke-width="2"/>

  <!-- Title block content lines -->
  <line x1="38" y1="73" x2="62" y2="73" stroke="#888888" stroke-width="2" stroke-linecap="round"/>
  <line x1="38" y1="79" x2="58" y2="79" stroke="#888888" stroke-width="2" stroke-linecap="round"/>

  <!-- Viewport rect inside sheet (gray dashed) -->
  <rect x="40" y="18" width="42" height="40" rx="2" fill="none" stroke="#888888" stroke-width="3.5" stroke-dasharray="5 4"/>

  <!-- Corner brackets on viewport (dark) -->
  <g fill="none" stroke="#2c3e50" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter">
    <path d="M 46 24 L 46 22 L 48 22"/>
    <path d="M 74 22 L 76 22 L 76 24"/>
    <path d="M 48 54 L 46 54 L 46 52"/>
    <path d="M 76 52 L 76 54 L 74 54"/>
  </g>

  <!-- Import arrow (dark) pointing right into the sheet -->
  <line x1="4" y1="48" x2="28" y2="48" stroke="#2c3e50" stroke-width="5" stroke-linecap="round"/>
  <path d="M 22 40 L 30 48 L 22 56" fill="none" stroke="#2c3e50" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Large sparkle bottom-left -->
  <path d="M 10 78 Q 10 86 18 86 Q 10 86 10 94 Q 10 86 2 86 Q 10 86 10 78 Z" fill="#f5a623"/>
</svg>
